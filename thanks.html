<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ありがとうございます - yori</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@400;500;700&family=Zen+Kaku+Gothic+New:wght@400;500;700&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'Noto Sans JP', sans-serif;
  color: #1a1a1a; background: #fafaf8;
  -webkit-font-smoothing: antialiased;
  min-height: 100vh; display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  padding: 2rem;
}
.card {
  text-align: center; max-width: 440px;
  background: #fff; border-radius: 20px;
  padding: 3rem 2.5rem;
  box-shadow: 0 8px 40px rgba(0,0,0,0.06);
  border: 1px solid #e5e5e0;
}
.emoji { font-size: 48px; margin-bottom: 1.5rem; }
h1 {
  font-family: 'Zen Kaku Gothic New', sans-serif;
  font-size: 1.6rem; font-weight: 700;
  margin-bottom: 1rem;
}
p { font-size: 1rem; color: #6b6b6b; line-height: 1.9; margin-bottom: 1.5rem; }
.btn {
  display: inline-block;
  background: #06C755; color: #fff;
  padding: 0.9rem 2rem; border-radius: 100px;
  font-size: 0.95rem; font-weight: 600;
  text-decoration: none;
  transition: transform 0.2s, box-shadow 0.2s;
}
.btn:hover { transform: translateY(-1px); box-shadow: 0 4px 16px rgba(6,199,85,0.3); }
.footer { margin-top: 2rem; font-size: 0.8rem; color: #999; }
</style>
</head>
<body>
<div class="card">
  <div class="emoji">&#x2728;</div>
  <h1>ありがとうございます</h1>
  <p>プランが反映されました。<br>LINEに戻って話しかけてみてね。</p>
  <a href="https://lin.ee/UDlGYea" class="btn">LINEに戻る</a>
</div>
<div class="footer">&copy; 2026 yori</div>
</body>
</html>
